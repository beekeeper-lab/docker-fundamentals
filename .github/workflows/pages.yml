name: Deploy course to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Needed for actions/deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deploy; queue new pushes that land mid-run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build course HTML
        run: uv run --with markdown --with pygments python scripts/build_course.py

      - name: Assemble Pages artifact
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r html _site/
          [ -d audio ] && cp -r audio _site/ || true
          [ -d images ] && cp -r images _site/ || true
          [ -d lab ] && cp -r lab _site/ || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
